# Theme matches the pitch slides: navy text, teal accent.
[theme]
primaryColor = "#0CA678"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F3F5"
textColor = "#14294C"
font = "sans serif"

[server]
headless = true

[client]
# Hide the developer toolbar/menu so the audience sees a clean product.
# You still manage the app from share.streamlit.io (Reboot / Settings / Logs).
toolbarMode = "minimal"
# Hide the multipage navigation so the audience stays on the check-in screen
# (the presenter opens the dashboard / cafeteria via direct URLs).
showSidebarNavigation = false
